<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rắn săn mồi · Snake game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b0f17 0%, #1a1f2f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .game-container {
            background: rgba(10, 14, 23, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 40px;
            padding: 30px 25px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.7), 0 0 0 2px #2e3a5e inset;
            max-width: 700px;
            width: fit-content;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0d1222;
            border-radius: 100px;
            padding: 12px 25px;
            margin-bottom: 25px;
            border: 1px solid #354477;
            box-shadow: 0 6px 0 #080b14;
        }
        .scores {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        .score-box, .high-score-box {
            background: #1b2340;
            border-radius: 60px;
            padding: 10px 25px;
            color: white;
            font-weight: 600;
            letter-spacing: 0.5px;
            border-left: 3px solid #5f7ef2;
            box-shadow: inset 0 2px 5px #00000055, 0 4px 0 #0c1020;
        }
        .score-box span, .high-score-box span {
            color: #a7c0ff;
            margin-right: 10px;
            font-size: 1.1rem;
        }
        .score-box .value, .high-score-box .value {
            color: #fff;
            font-size: 1.8rem;
            font-weight: 800;
            text-shadow: 0 0 10px #5f7ef2;
        }
        #startBtn {
            background: #3b4e7a;
            border: none;
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 12px 35px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 8px 0 #1b253f, 0 2px 20px #5f7ef2;
            transition: 0.07s ease;
            letter-spacing: 1px;
            border: 1px solid #7f9eff;
        }
        #startBtn:hover {
            background: #4f66a0;
            transform: translateY(-2px);
            box-shadow: 0 10px 0 #1b253f, 0 4px 25px #7b9aff;
        }
        #startBtn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #1b253f, 0 2px 15px #5f7ef2;
        }
        .canvas-wrapper {
            display: flex;
            justify-content: center;
            border-radius: 40px;
            background: #0c1020;
            padding: 15px;
            box-shadow: inset 0 -5px 0 #03050b, 0 15px 30px black;
        }
        canvas {
            width: 100%;
            height: auto;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            display: block;
            border-radius: 30px;
            background: #0a0e1a;
            box-shadow: 0 0 0 2px #2b3b62, 0 20px 30px #00000080;
            image-rendering: crisp-edges; /* giữ ô vuông sắc nét */
        }
        .footer-note {
            text-align: center;
            margin-top: 18px;
            color: #6c7fb0;
            font-weight: 500;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .game-over-message {
            display: none;
            font-size: 2rem;
            font-weight: 900;
            color: #ff4d6d;
            text-shadow: 0 0 20px red;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #0b0f1ad9;
            padding: 15px 35px;
            border-radius: 60px;
            backdrop-filter: blur(5px);
            border: 2px solid #ff1744;
            z-index: 10;
            pointer-events: none;
        }
        .canvas-wrapper {
            position: relative;
        }
        .blink-effect {
            animation: blinkBg 0.2s 3;
        }
        @keyframes blinkBg {
            0% { background: #ff4d6d55; }
            100% { background: #0c1020; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="scores">
                <div class="score-box"><span>🍎</span><span id="scoreDisplay" class="value">0</span></div>
                <div class="high-score-box"><span>🏆</span><span id="highScoreDisplay" class="value">0</span></div>
            </div>
            <button id="startBtn">▶ CHƠI</button>
        </div>

        <div class="canvas-wrapper" id="canvasWrapper">
            <canvas id="gameCanvas" width="500" height="500"></canvas>
            <div id="gameOverMessage" class="game-over-message">GAME OVER</div>
        </div>

        <div class="footer-note">↑ ↓ ← →  |  không quay đầu</div>
    </div>

    <script>
        (function() {
            // ==================== CẤU HÌNH & BIẾN TOÀN CỤC ====================
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const scoreSpan = document.getElementById('scoreDisplay');
            const highScoreSpan = document.getElementById('highScoreDisplay');
            const startBtn = document.getElementById('startBtn');
            const gameOverDiv = document.getElementById('gameOverMessage');
            const wrapper = document.querySelector('.canvas-wrapper');

            // Kích thước lưới
            const GRID_SIZE = 20;          // 20x20 ô
            const CELL_SIZE = canvas.width / GRID_SIZE; // 25px

            // Biến trạng thái game
            let snake = [
                {x: 10, y: 10},
                {x: 9, y: 10},
                {x: 8, y: 10}
            ]; // ban đầu dài 3
            let food = {x: 15, y: 10};
            let direction = 'RIGHT';   // hướng hiện tại
            let nextDirection = 'RIGHT';
            let score = 0;
            let highScore = localStorage.getItem('snakeHighScore') ? parseInt(localStorage.getItem('snakeHighScore')) : 0;
            let gameActive = false;
            let gameLoopInterval = null;
            let gameSpeed = 150;        // ms (càng nhỏ càng nhanh)
            const BASE_SPEED = 150;
            const MIN_SPEED = 70;        // tốc độ tối đa

            // Cờ ngăn quay đầu 180 độ
            let pendingDirection = null;

            // Âm thanh (Web Audio)
            let audioCtx = null;

            // Hiển thị high score ban đầu
            highScoreSpan.textContent = highScore;

            // ==================== KHỞI TẠO AUDIO ====================
            function playEatSound() {
                if (!audioCtx) {
                    try {
                        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    } catch (e) {
                        console.warn("Web Audio API không được hỗ trợ");
                        return;
                    }
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = 520;
                gainNode.gain.value = 0.15;
                osc.connect(gainNode).connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            }

            // ==================== VẼ ====================
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Vẽ lưới mờ
                ctx.strokeStyle = '#2a3455';
                ctx.lineWidth = 0.8;
                for (let i = 0; i <= GRID_SIZE; i++) {
                    ctx.beginPath();
                    ctx.moveTo(i * CELL_SIZE, 0);
                    ctx.lineTo(i * CELL_SIZE, canvas.height);
                    ctx.strokeStyle = '#2a3a60';
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.moveTo(0, i * CELL_SIZE);
                    ctx.lineTo(canvas.width, i * CELL_SIZE);
                    ctx.stroke();
                }

                // Vẽ thức ăn (đỏ tươi, hiệu ứng glow)
                ctx.shadowColor = '#ff3b3b';
                ctx.shadowBlur = 15;
                ctx.fillStyle = '#ff2a2a';
                ctx.beginPath();
                ctx.arc(food.x * CELL_SIZE + CELL_SIZE/2, food.y * CELL_SIZE + CELL_SIZE/2, CELL_SIZE/2 - 2, 0, Math.PI*2);
                ctx.fill();
                // Thêm ánh sáng
                ctx.shadowBlur = 25;
                ctx.fillStyle = '#ff7777';
                ctx.beginPath();
                ctx.arc(food.x * CELL_SIZE + CELL_SIZE/2, food.y * CELL_SIZE + CELL_SIZE/2, CELL_SIZE/4, 0, Math.PI*2);
                ctx.fill();

                // Vẽ rắn (thân xanh neon, đầu sáng hơn)
                ctx.shadowBlur = 12;
                ctx.shadowColor = '#00e676';
                for (let i = 0; i < snake.length; i++) {
                    const seg = snake[i];
                    let color = '#26c96b'; // xanh lá
                    if (i === 0) color = '#76ff7b'; // đầu sáng hơn

                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.roundRect(seg.x * CELL_SIZE + 2, seg.y * CELL_SIZE + 2, CELL_SIZE - 4, CELL_SIZE - 4, 6);
                    ctx.fill();
                }

                // Mắt rắn nếu game đang chạy (thêm sinh động)
                if (snake.length > 0 && gameActive) {
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#ffffff';
                    const head = snake[0];
                    ctx.beginPath();
                    ctx.arc(head.x * CELL_SIZE + CELL_SIZE*0.35, head.y * CELL_SIZE + CELL_SIZE*0.35, 3, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(head.x * CELL_SIZE + CELL_SIZE*0.65, head.y * CELL_SIZE + CELL_SIZE*0.35, 3, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#121212';
                    ctx.beginPath();
                    ctx.arc(head.x * CELL_SIZE + CELL_SIZE*0.35, head.y * CELL_SIZE + CELL_SIZE*0.33, 1.5, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(head.x * CELL_SIZE + CELL_SIZE*0.65, head.y * CELL_SIZE + CELL_SIZE*0.33, 1.5, 0, Math.PI*2);
                    ctx.fill();
                }

                ctx.shadowBlur = 0; // reset
            }

            // Helper vẽ hình chữ nhật bo góc
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                this.closePath();
                return this;
            };

            // ==================== SPAWN THỨC ĂN (tránh trùng rắn) ====================
            function spawnFood() {
                const freeCells = [];
                // Duyệt tất cả ô, tìm ô không có rắn
                for (let i = 0; i < GRID_SIZE; i++) {
                    for (let j = 0; j < GRID_SIZE; j++) {
                        if (!snake.some(seg => seg.x === i && seg.y === j)) {
                            freeCells.push({x: i, y: j});
                        }
                    }
                }
                if (freeCells.length === 0) {
                    // Nếu hết ô (win) -> xem như game over? Hiếm. Tạm thời kết thúc game.
                    gameOver();
                    return;
                }
                const rand = Math.floor(Math.random() * freeCells.length);
                food = freeCells[rand];
            }

            // ==================== KIỂM TRA VA CHẠM ====================
            function checkCollision(newHead, snakeBody) {
                // Tường
                if (newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE) {
                    return true;
                }
                // Tự cắn (bỏ qua phần đầu cũ, vì đầu mới có thể trùng với phần đầu cũ? không)
                for (let i = 0; i < snakeBody.length; i++) {
                    if (snakeBody[i].x === newHead.x && snakeBody[i].y === newHead.y) {
                        return true;
                    }
                }
                return false;
            }

            // ==================== CẬP NHẬT (DI CHUYỂN) ====================
            function update() {
                if (!gameActive) return;

                // Áp dụng hướng đã được kiểm tra (không cho quay đầu)
                if (pendingDirection) {
                    const isOpposite = (
                        (direction === 'RIGHT' && pendingDirection === 'LEFT') ||
                        (direction === 'LEFT' && pendingDirection === 'RIGHT') ||
                        (direction === 'UP' && pendingDirection === 'DOWN') ||
                        (direction === 'DOWN' && pendingDirection === 'UP')
                    );
                    if (!isOpposite) {
                        direction = pendingDirection;
                    }
                    pendingDirection = null;
                }

                // Tính đầu mới
                let newHead = {...snake[0]};
                switch (direction) {
                    case 'RIGHT': newHead.x += 1; break;
                    case 'LEFT':  newHead.x -= 1; break;
                    case 'UP':    newHead.y -= 1; break;
                    case 'DOWN':  newHead.y += 1; break;
                }

                // Kiểm tra va chạm trước khi ăn
                if (checkCollision(newHead, snake)) {
                    gameOver();
                    return;
                }

                // Thêm đầu mới
                snake.unshift(newHead);

                // Kiểm tra ăn thức ăn
                if (newHead.x === food.x && newHead.y === food.y) {
                    // Tăng điểm, dài ra (không xóa đuôi)
                    score += 10;
                    scoreSpan.textContent = score;

                    // Cập nhật high score
                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('snakeHighScore', highScore);
                        highScoreSpan.textContent = highScore;
                    }

                    // Âm thanh
                    playEatSound();

                    // Tạo thức ăn mới
                    spawnFood();

                    // Tăng tốc độ (nếu chưa đạt min)
                    if (gameSpeed > MIN_SPEED) {
                        gameSpeed = Math.max(MIN_SPEED, BASE_SPEED - Math.floor(score / 30) * 10);
                        // Điều chỉnh lại interval
                        if (gameActive) {
                            clearInterval(gameLoopInterval);
                            gameLoopInterval = setInterval(() => {
                                update();
                                draw();
                            }, gameSpeed);
                        }
                    }
                } else {
                    // Không ăn thì xóa đuôi
                    snake.pop();
                }

                draw(); // vẽ lại sau mỗi bước
            }

            // ==================== GAME OVER ====================
            function gameOver() {
                if (!gameActive) return;
                gameActive = false;
                clearInterval(gameLoopInterval);

                // Hiệu ứng nhấp nháy
                wrapper.classList.add('blink-effect');
                gameOverDiv.style.display = 'block';
                setTimeout(() => {
                    wrapper.classList.remove('blink-effect');
                }, 600);

                // Vẽ lại trạng thái cuối
                draw();
            }

            // ==================== RESET GAME ====================
            function resetGame() {
                // Ẩn game over message
                gameOverDiv.style.display = 'none';
                wrapper.classList.remove('blink-effect');

                // Reset thông số
                snake = [
                    {x: 10, y: 10},
                    {x: 9, y: 10},
                    {x: 8, y: 10}
                ];
                direction = 'RIGHT';
                nextDirection = 'RIGHT';
                pendingDirection = null;
                score = 0;
                gameSpeed = BASE_SPEED;
                scoreSpan.textContent = '0';
                // High score giữ nguyên

                // Đặt thức ăn mới
                do {
                    food = {
                        x: Math.floor(Math.random() * GRID_SIZE),
                        y: Math.floor(Math.random() * GRID_SIZE)
                    };
                } while (snake.some(seg => seg.x === food.x && seg.y === food.y));

                // Vẽ lại ngay
                draw();

                // Nếu đang active thì dừng interval cũ
                if (gameActive) {
                    clearInterval(gameLoopInterval);
                    gameActive = false;
                }
            }

            // ==================== BẮT ĐẦU GAME ====================
            function startGame() {
                if (gameActive) {
                    // Nếu đang chạy, restart luôn (reset rồi chạy)
                    resetGame();
                } else {
                    // Nếu chưa chạy, reset đảm bảo sạch sẽ
                    resetGame();
                }
                gameActive = true;
                // Bắt đầu loop
                if (gameLoopInterval) clearInterval(gameLoopInterval);
                gameLoopInterval = setInterval(() => {
                    update();
                    draw();
                }, gameSpeed);

                // Resume audio context nếu bị treo (do chính sách auto-play)
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }

            // ==================== XỬ LÝ BÀN PHÍM ====================
            function handleKey(e) {
                const key = e.key;
                e.preventDefault(); // chặn cuộn trang

                if (!gameActive) return;

                // Chỉ xử lý phím mũi tên
                let newDir = null;
                if (key === 'ArrowUp') newDir = 'UP';
                else if (key === 'ArrowDown') newDir = 'DOWN';
                else if (key === 'ArrowLeft') newDir = 'LEFT';
                else if (key === 'ArrowRight') newDir = 'RIGHT';
                else return;

                // Kiểm tra đối nghịch với hướng hiện tại
                const isOpposite = (
                    (direction === 'RIGHT' && newDir === 'LEFT') ||
                    (direction === 'LEFT' && newDir === 'RIGHT') ||
                    (direction === 'UP' && newDir === 'DOWN') ||
                    (direction === 'DOWN' && newDir === 'UP')
                );

                if (!isOpposite) {
                    // Nếu không phải ngược, cho phép đổi hướng trong lần update tới
                    pendingDirection = newDir;
                }
            }

            // Lắng nghe sự kiện phím
            window.addEventListener('keydown', (e) => {
                if (e.key.startsWith('Arrow')) {
                    e.preventDefault();
                    handleKey(e);
                }
            });

            // Nút Start / Restart
            startBtn.addEventListener('click', () => {
                startGame();
            });

            // Khởi tạo game ở trạng thái tĩnh (vẽ rắn và thức ăn)
            (function init() {
                resetGame();  // vẽ sẵn nhưng chưa chạy
                // Không active cho tới khi nhấn nút
                gameActive = false;
                clearInterval(gameLoopInterval);
                draw();
            })();

            // Responsive: canvas đã scale bằng CSS, giữ nguyên tỉ lệ.
            // Chú ý: Nếu muốn xử lý touch hoặc mobile có thể thêm, nhưng yêu cầu không bắt buộc.
        })();
    </script>
</body>
</html>
