<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Render Web App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
            backdrop-filter: blur(10px);
            transition: transform 0.3s;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #4a4a4a;
            letter-spacing: 1px;
        }

        p {
            font-size: 1.1em;
            margin-bottom: 30px;
            color: #666;
            line-height: 1.6;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            margin-bottom: 20px;
        }

        button:hover {
            background: #764ba2;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        #message {
            font-size: 1.2em;
            margin: 15px 0;
            min-height: 30px;
            color: #764ba2;
            font-weight: 500;
        }

        .time {
            font-size: 2em;
            font-weight: bold;
            color: #4a4a4a;
            background: #f0f0f0;
            padding: 10px 20px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        .footer {
            margin-top: 20px;
            font-size: 0.9em;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Deployed on Render</h1>
        <p>Chào mừng bạn đến với trang web của tôi! Trang web này được viết bằng HTML, CSS và JavaScript, và đã được triển khai thành công trên Render.</p>
        <button id="actionBtn">Nhấn vào tôi</button>
        <div id="message"></div>
        <div class="time" id="clock">00:00:00</div>
        <div class="footer">© 2025 - My Render App</div>
    </div>

    <script>
        // Lấy các phần tử
        const btn = document.getElementById('actionBtn');
        const messageDiv = document.getElementById('message');
        const clockDiv = document.getElementById('clock');

        // Mảng các thông điệp
        const messages = [
            "Chúc bạn một ngày tốt lành!",
            "Cảm ơn bạn đã ghé thăm!",
            "Render là một nền tảng tuyệt vời!",
            "Bạn thật tuyệt vời!",
            "Hãy luôn mỉm cười nhé!"
        ];

        // Xử lý sự kiện click
        btn.addEventListener('click', () => {
            const randomIndex = Math.floor(Math.random() * messages.length);
            messageDiv.textContent = messages[randomIndex];
        });

        // Hàm cập nhật đồng hồ
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            clockDiv.textContent = `${hours}:${minutes}:${seconds}`;
        }

        // Cập nhật đồng hồ mỗi giây
        setInterval(updateClock, 1000);
        updateClock(); // gọi ngay lập tức
    </script>
</body>
</html>
